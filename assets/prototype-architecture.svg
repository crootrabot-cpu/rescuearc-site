  <g fill="#153150" font-family="Inter, Arial" font-size="28">
    <text x="970" y="398">Soft throw shell / grip geometry</text>
    <text x="1038" y="496">Folded high-vis bladder</text>
    <text x="1032" y="596">CO₂ cartridge chamber</text>
    <text x="1000" y="702">Puncture inflator + valve path</text>
    <text x="980" y="798">Water trigger / backup delay module</text>
  </g>

  <g transform="translate(1020 312)">
    <rect width="396" height="514" rx="34" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="6"/>
    <text x="34" y="62" fill="#153150" font-family="Inter, Arial" font-size="30" font-weight="700">What to bench test immediately</text>
    <g fill="#536075" font-family="Inter, Arial" font-size="24">
      <text x="38" y="120">• accidental deploy during carry</text>
      <text x="38" y="166">• failed puncture / no gas release</text>
      <text x="38" y="212">• partial inflation</text>
      <text x="38" y="258">• premature inflation in air</text>
      <text x="38" y="304">• bladder snag on shell exit</text>
      <text x="38" y="350">• impact hardness on target zone</text>
      <text x="38" y="396">• visibility and grabability in chop</text>
      <text x="38" y="442">• re-arm and cartridge swap friction</text>
    </g>
  </g>

  <text x="116" y="1004" fill="#153150" font-family="Georgia, serif" font-size="44">If this can’t survive false-fire / no-fire / impact-safety tests, the company story collapses early.</text>
</svg>
