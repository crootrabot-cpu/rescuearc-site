    <circle cx="430" cy="235" r="84" fill="#F8F6F1" stroke="#153150" stroke-width="10"/>
    <rect x="416" y="194" width="28" height="84" rx="14" fill="#153150"/>
    <circle cx="430" cy="184" r="24" fill="#D84B46" stroke="#153150" stroke-width="6"/>
    <rect x="340" y="210" width="74" height="52" rx="18" fill="#1F8FA1" opacity="0.88"/>
    <rect x="450" y="210" width="108" height="52" rx="18" fill="#D39E4D" opacity="0.88"/>
