  <text x="1146" y="735" fill="#536075" font-family="Inter, Arial" font-size="25">Inflated geometry must be visible, grab-friendly, and not orientation-fussy.</text>

  <text x="144" y="964" fill="#153150" font-family="Georgia, serif" font-size="44">The hard part is not “it inflates.” The hard part is reliable, safe, useful deployment.</text>
